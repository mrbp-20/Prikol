<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Aquarium</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #02111b;
      --panel: rgba(5, 23, 35, 0.65);
      --border: rgba(160, 230, 255, 0.18);
      --text: #daf6ff;
      --muted: #8cc9d7;
      --accent: #53d8ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at 50% 20%, #0c2a43 0%, #04111d 45%, #02070b 100%); }
    body { font-family: Inter, system-ui, sans-serif; color: var(--text); }
    canvas { display: block; }
    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 12px 14px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      pointer-events: none;
      z-index: 2;
      max-width: min(360px, calc(100vw - 32px));
    }
    .hud h1 {
      margin: 0 0 6px;
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f2fbff;
    }
    .hud p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
    }
    .credit {
      position: fixed;
      right: 16px;
      bottom: 16px;
      padding: 9px 11px;
      font-size: 12px;
      color: #bcecf9;
      background: rgba(4, 18, 28, 0.52);
      border: 1px solid rgba(173, 233, 255, 0.12);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="hud">
    <h1>Procedural Aquarium</h1>
    <p>Drag to orbit, scroll to zoom. Fish use procedural steering, boundary avoidance, schooling separation, and body-wave animation linked to swim speed.</p>
  </div>
  <div class="credit">Single-file Three.js scene</div>

  <script src="https://unpkg.com/three@0.161.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.161.0/examples/js/controls/OrbitControls.js"></script>
  <script>

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x072235, 0.035);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2.8, 10.5);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.4, 0);
    controls.minDistance = 5.5;
    controls.maxDistance = 18;
    controls.maxPolarAngle = Math.PI * 0.92;

    scene.add(new THREE.AmbientLight(0x7ec9ff, 0.8));

    const key = new THREE.DirectionalLight(0xc8f4ff, 1.8);
    key.position.set(6, 9, 7);
    key.castShadow = true;
    key.shadow.mapSize.set(1024, 1024);
    key.shadow.camera.near = 0.5;
    key.shadow.camera.far = 30;
    key.shadow.camera.left = -8;
    key.shadow.camera.right = 8;
    key.shadow.camera.top = 8;
    key.shadow.camera.bottom = -8;
    scene.add(key);

    const fill = new THREE.PointLight(0x3fd6ff, 2.0, 25, 2);
    fill.position.set(-3, 4.5, 2);
    scene.add(fill);

    const caustic = new THREE.PointLight(0x68f0ff, 1.8, 20, 2);
    caustic.position.set(0, 5, 0);
    scene.add(caustic);

    const world = new THREE.Group();
    scene.add(world);

    const tank = {
      width: 7.2,
      height: 4.2,
      depth: 3.8,
      wall: 0.08,
      waterMargin: 0.12,
    };

    const half = {
      x: tank.width * 0.5 - tank.wall - tank.waterMargin,
      y: tank.height - tank.wall - tank.waterMargin,
      z: tank.depth * 0.5 - tank.wall - tank.waterMargin,
    };

    const floor = new THREE.Mesh(
      new THREE.BoxGeometry(tank.width + 1.8, 0.6, tank.depth + 1.8),
      new THREE.MeshStandardMaterial({ color: 0x10222d, roughness: 0.88, metalness: 0.04 })
    );
    floor.position.y = -0.35;
    floor.receiveShadow = true;
    world.add(floor);

    const tankGlass = new THREE.Mesh(
      new THREE.BoxGeometry(tank.width, tank.height, tank.depth),
      new THREE.MeshPhysicalMaterial({
        color: 0xc8f6ff,
        transparent: true,
        opacity: 0.16,
        roughness: 0.03,
        transmission: 0.78,
        thickness: 0.35,
        ior: 1.15,
        metalness: 0,
        clearcoat: 1,
        clearcoatRoughness: 0.04,
        side: THREE.DoubleSide
      })
    );
    tankGlass.position.y = tank.height * 0.5;
    world.add(tankGlass);

    const edgeMat = new THREE.MeshPhysicalMaterial({
      color: 0xb8f4ff,
      emissive: 0x163847,
      roughness: 0.18,
      metalness: 0.25,
      transparent: true,
      opacity: 0.5
    });
    const edgeGroup = new THREE.Group();
    const edgeRadius = 0.04;
    const edgeHeight = tank.height;
    const edgeGeomV = new THREE.CylinderGeometry(edgeRadius, edgeRadius, edgeHeight, 10);
    const edgeGeomH = new THREE.CylinderGeometry(edgeRadius, edgeRadius, tank.width, 10);
    const edgeGeomD = new THREE.CylinderGeometry(edgeRadius, edgeRadius, tank.depth, 10);

    [
      [-tank.width/2, tank.height/2, -tank.depth/2],
      [ tank.width/2, tank.height/2, -tank.depth/2],
      [-tank.width/2, tank.height/2,  tank.depth/2],
      [ tank.width/2, tank.height/2,  tank.depth/2],
    ].forEach(([x,y,z]) => {
      const e = new THREE.Mesh(edgeGeomV, edgeMat);
      e.position.set(x, y, z);
      edgeGroup.add(e);
    });

    const makeH = (lenGeom, x, y, z, rx, rz) => {
      const e = new THREE.Mesh(lenGeom, edgeMat);
      e.position.set(x,y,z);
      e.rotation.z = rz || 0;
      e.rotation.x = rx || 0;
      edgeGroup.add(e);
    };
    [-tank.height/2 + tank.height, 0].forEach(localY => {
      const y = localY;
      makeH(edgeGeomH, 0, y, -tank.depth/2, 0, Math.PI/2);
      makeH(edgeGeomH, 0, y,  tank.depth/2, 0, Math.PI/2);
      makeH(edgeGeomD, -tank.width/2, y, 0, Math.PI/2, 0);
      makeH(edgeGeomD,  tank.width/2, y, 0, Math.PI/2, 0);
    });
    edgeGroup.position.y = 0;
    world.add(edgeGroup);

    const water = new THREE.Mesh(
      new THREE.BoxGeometry(tank.width - tank.wall * 1.8, tank.height - 0.22, tank.depth - tank.wall * 1.8),
      new THREE.MeshPhysicalMaterial({
        color: 0x4bc7d9,
        transparent: true,
        opacity: 0.18,
        transmission: 0.45,
        thickness: 0.9,
        roughness: 0.08,
        ior: 1.333,
        clearcoat: 0.7,
        clearcoatRoughness: 0.1,
        side: THREE.DoubleSide
      })
    );
    water.position.y = tank.height * 0.5 - 0.03;
    world.add(water);

    const waterTop = new THREE.Mesh(
      new THREE.PlaneGeometry(tank.width - 0.18, tank.depth - 0.18, 96, 64),
      new THREE.MeshPhysicalMaterial({
        color: 0x74f1ff,
        transparent: true,
        opacity: 0.32,
        roughness: 0.16,
        metalness: 0,
        clearcoat: 1,
        clearcoatRoughness: 0.03,
        side: THREE.DoubleSide
      })
    );
    waterTop.rotation.x = -Math.PI / 2;
    waterTop.position.y = tank.height - 0.12;
    world.add(waterTop);

    const gravel = new THREE.Group();
    const gravelPalette = [0x7f8e97, 0x95a7ad, 0x63717a, 0x51636e, 0xadb8ba];
    for (let i = 0; i < 240; i++) {
      const stone = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.05 + Math.random() * 0.08, 0),
        new THREE.MeshStandardMaterial({ color: gravelPalette[(Math.random() * gravelPalette.length) | 0], roughness: 0.9, metalness: 0.02 })
      );
      stone.position.set((Math.random() - 0.5) * (tank.width - 0.5), 0.02 + Math.random() * 0.08, (Math.random() - 0.5) * (tank.depth - 0.5));
      stone.scale.setScalar(0.8 + Math.random() * 1.4);
      stone.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
      stone.castShadow = true;
      stone.receiveShadow = true;
      gravel.add(stone);
    }
    world.add(gravel);

    const plants = new THREE.Group();
    for (let i = 0; i < 18; i++) {
      const h = 0.5 + Math.random() * 1.3;
      const blade = new THREE.Mesh(
        new THREE.PlaneGeometry(0.12 + Math.random() * 0.07, h, 1, 8),
        new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(0.33 + Math.random() * 0.08, 0.5, 0.25 + Math.random() * 0.18), side: THREE.DoubleSide, roughness: 0.9 })
      );
      blade.position.set((Math.random() - 0.5) * (tank.width - 0.6), h * 0.5, (Math.random() - 0.5) * (tank.depth - 0.5));
      blade.rotation.y = Math.random() * Math.PI;
      blade.userData.base = blade.geometry.attributes.position.array.slice();
      plants.add(blade);
    }
    world.add(plants);

    const bubbleCount = 110;
    const bubblePositions = new Float32Array(bubbleCount * 3);
    const bubbleSizes = new Float32Array(bubbleCount);
    const bubbleData = [];
    for (let i = 0; i < bubbleCount; i++) {
      bubbleData.push({
        x: (Math.random() - 0.5) * (tank.width - 0.6),
        y: Math.random() * (tank.height - 0.3) + 0.15,
        z: (Math.random() - 0.5) * (tank.depth - 0.6),
        speed: 0.15 + Math.random() * 0.22,
        sway: 0.2 + Math.random() * 0.25,
        phase: Math.random() * Math.PI * 2
      });
      bubbleSizes[i] = 8 + Math.random() * 11;
    }
    const bubbleGeo = new THREE.BufferGeometry();
    bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePositions, 3));
    bubbleGeo.setAttribute('size', new THREE.BufferAttribute(bubbleSizes, 1));
    const bubbleMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: {
        color: { value: new THREE.Color(0xb9f8ff) },
        pixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
      },
      vertexShader: `
        attribute float size;
        uniform float pixelRatio;
        varying float vAlpha;
        void main() {
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          float dist = -mvPosition.z;
          gl_PointSize = size * pixelRatio * (22.0 / max(dist, 0.1));
          gl_Position = projectionMatrix * mvPosition;
          vAlpha = clamp(1.0 - dist * 0.04, 0.15, 0.85);
        }
      `,
      fragmentShader: `
        uniform vec3 color;
        varying float vAlpha;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d = length(uv);
          float ring = smoothstep(0.48, 0.16, d) - smoothstep(0.16, 0.0, d) * 0.25;
          float alpha = ring * vAlpha;
          if(alpha < 0.01) discard;
          gl_FragColor = vec4(color, alpha);
        }
      `
    });
    const bubbles = new THREE.Points(bubbleGeo, bubbleMat);
    world.add(bubbles);

    function createFishTexture(baseHex, stripeHex, bellyHex) {
      const c = document.createElement('canvas');
      c.width = 256;
      c.height = 128;
      const g = c.getContext('2d');
      const grad = g.createLinearGradient(0, 0, 256, 128);
      grad.addColorStop(0, baseHex);
      grad.addColorStop(0.5, stripeHex);
      grad.addColorStop(1, baseHex);
      g.fillStyle = grad;
      g.fillRect(0, 0, c.width, c.height);

      const belly = g.createLinearGradient(0, 76, 0, 128);
      belly.addColorStop(0, 'rgba(255,255,255,0.0)');
      belly.addColorStop(1, bellyHex);
      g.fillStyle = belly;
      g.fillRect(0, 0, c.width, c.height);

      g.globalAlpha = 0.32;
      g.strokeStyle = 'rgba(255,255,255,0.35)';
      for (let y = 12; y < 118; y += 10) {
        for (let x = (y % 20 === 0 ? 12 : 18); x < 244; x += 16) {
          g.beginPath();
          g.arc(x, y, 7, Math.PI * 0.2, Math.PI * 1.8);
          g.stroke();
        }
      }
      g.globalAlpha = 1;

      g.fillStyle = 'rgba(255,255,255,0.18)';
      for (let i = 0; i < 7; i++) {
        g.beginPath();
        g.ellipse(70 + i * 22, 38 + (i % 2) * 4, 24, 9, -0.3, 0, Math.PI * 2);
        g.fill();
      }

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    function createFinGeometry(length, height, segments = 10, taper = 1.0) {
      const geom = new THREE.PlaneGeometry(length, height, segments, 1);
      const pos = geom.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const u = (x / length) + 0.5;
        const falloff = 1.0 - u;
        pos.setY(i, y * (0.18 + falloff * taper));
        pos.setZ(i, Math.sin(u * Math.PI) * 0.03 * falloff);
      }
      pos.needsUpdate = true;
      geom.computeVertexNormals();
      return geom;
    }

    function createFishGeometry(length = 1.15, height = 0.62, width = 0.34, radialSeg = 22, bodySeg = 32) {
      const geom = new THREE.CylinderGeometry(0.2, 0.04, length, radialSeg, bodySeg, false);
      geom.rotateZ(Math.PI / 2);
      const pos = geom.attributes.position;
      const uv = geom.attributes.uv;
      const bodyData = new Float32Array(pos.count * 4);

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const z = pos.getZ(i);
        const t = (x / length) + 0.5;
        // Procedural fish profile: front-heavy body, tapered tail, and subtle dorsal ridge.
        // "t" is the normalized position along fish length and drives anatomy masks.
        const bodyProfile = Math.sin(Math.PI * Math.pow(t, 0.78));
        const tailTaper = 1.0 - Math.pow(Math.max(0, (t - 0.64) / 0.36), 1.5);
        const headBulge = 0.72 + Math.exp(-Math.pow((t - 0.26) / 0.18, 2)) * 0.52;
        const belly = 1.0 + (y < 0 ? 0.24 : -0.06) * (1.0 - Math.abs(t - 0.5) * 1.7);
        const lateral = 0.75 + 0.35 * Math.cos((t - 0.18) * Math.PI * 1.5);
        const scaleY = height * bodyProfile * headBulge * tailTaper * belly;
        const scaleZ = width * bodyProfile * tailTaper * lateral;
        const dorsalRidge = Math.exp(-Math.pow((t - 0.48) / 0.18, 2)) * 0.08;
        const flankFlatten = 1.0 - Math.abs(z) * 0.08;

        pos.setY(i, y * scaleY + dorsalRidge * Math.max(0, 1 - Math.abs(y) * 3.5));
        pos.setZ(i, z * scaleZ * flankFlatten);

        const nx = Math.max(0, (t - 0.45) / 0.55);
        // Custom per-vertex channels for shader undulation:
        // x=t along body, y=body envelope, z=tail influence mask, w=local side sign.
        bodyData[i * 4 + 0] = t;
        bodyData[i * 4 + 1] = Math.sin(t * Math.PI);
        bodyData[i * 4 + 2] = nx;
        bodyData[i * 4 + 3] = y / 0.2;

        uv.setXY(i, t, (Math.atan2(z, y) / (Math.PI * 2)) + 0.5);
      }

      geom.setAttribute('aBody', new THREE.BufferAttribute(bodyData, 4));
      pos.needsUpdate = true;
      uv.needsUpdate = true;
      geom.computeVertexNormals();
      return geom;
    }

    function fishMaterial(texture, finColor) {
      return new THREE.MeshPhysicalMaterial({
        map: texture,
        color: 0xffffff,
        roughness: 0.32,
        metalness: 0.06,
        clearcoat: 1.0,
        clearcoatRoughness: 0.16,
        sheen: 1.0,
        sheenColor: new THREE.Color(finColor).offsetHSL(0, 0.05, 0.18),
        iridescence: 0.6,
        iridescenceIOR: 1.3,
        side: THREE.DoubleSide
      });
    }

    function patchFishShader(material) {
      material.onBeforeCompile = (shader) => {
        shader.uniforms.uTime = { value: 0 };
        shader.uniforms.uWaveAmp = { value: 0.12 };
        shader.uniforms.uSpeed = { value: 1 };
        material.userData.shader = shader;

        shader.vertexShader = shader.vertexShader
          .replace('#include <common>', `#include <common>\nattribute vec4 aBody;\nuniform float uTime;\nuniform float uWaveAmp;\nuniform float uSpeed;`)
          .replace('#include <begin_vertex>', `
            vec3 transformed = vec3(position);
            // Wave grows towards tail. Faster fish -> faster phase progression and larger bend.
            float tailMask = smoothstep(0.42, 1.0, aBody.x);
            float wavePhase = uTime * (2.0 + uSpeed * 1.3) - aBody.x * 10.5;
            float lateralWave = sin(wavePhase) * uWaveAmp * (0.15 + aBody.z * 1.2);
            float verticalWave = cos(wavePhase * 0.7 + aBody.x * 5.0) * uWaveAmp * 0.12 * tailMask;
            transformed.z += lateralWave;
            transformed.y += verticalWave;
            float yaw = lateralWave * 0.28;
            float cy = cos(yaw), sy = sin(yaw);
            transformed.xz = mat2(cy, -sy, sy, cy) * transformed.xz;
          `);

        shader.fragmentShader = shader.fragmentShader
          .replace('#include <common>', `#include <common>\nuniform float uTime;`)
          .replace('#include <color_fragment>', `
            #include <color_fragment>
            float shimmer = 0.5 + 0.5 * sin(vMapUv.x * 32.0 + vMapUv.y * 18.0 + uTime * 3.5);
            diffuseColor.rgb += vec3(0.06, 0.09, 0.12) * shimmer;
          `);
      };
      material.customProgramCacheKey = () => 'fish-wave-v1';
      return material;
    }

    function makeFishVariant(options) {
      const group = new THREE.Group();
      const root = new THREE.Group();
      group.add(root);

      const texture = createFishTexture(options.base, options.stripe, options.belly);
      const bodyGeom = createFishGeometry(options.length, options.height, options.width);
      const bodyMat = patchFishShader(fishMaterial(texture, options.fin));
      const body = new THREE.Mesh(bodyGeom, bodyMat);
      body.castShadow = true;
      body.receiveShadow = true;
      root.add(body);

      const tailPivot = new THREE.Group();
      tailPivot.position.x = options.length * 0.48;
      root.add(tailPivot);

      const tail = new THREE.Mesh(
        createFinGeometry(options.length * 0.44, options.height * 0.84, 14, 1.15),
        new THREE.MeshPhysicalMaterial({
          color: options.fin,
          transparent: true,
          opacity: 0.86,
          roughness: 0.24,
          metalness: 0.03,
          transmission: 0.18,
          clearcoat: 0.8,
          side: THREE.DoubleSide
        })
      );
      tail.rotation.y = Math.PI / 2;
      tail.position.x = options.length * 0.12;
      tail.castShadow = true;
      tailPivot.add(tail);

      const dorsalPivot = new THREE.Group();
      dorsalPivot.position.set(options.length * 0.03, options.height * 0.28, 0);
      root.add(dorsalPivot);
      const dorsal = new THREE.Mesh(
        createFinGeometry(options.length * 0.28, options.height * 0.46, 10, 1.2),
        new THREE.MeshPhysicalMaterial({ color: options.fin, transparent: true, opacity: 0.72, roughness: 0.32, clearcoat: 0.7, side: THREE.DoubleSide })
      );
      dorsal.rotation.x = Math.PI / 2;
      dorsal.rotation.z = -0.18;
      dorsalPivot.add(dorsal);

      const analPivot = new THREE.Group();
      analPivot.position.set(options.length * 0.08, -options.height * 0.19, 0);
      root.add(analPivot);
      const anal = new THREE.Mesh(
        createFinGeometry(options.length * 0.24, options.height * 0.3, 8, 0.95),
        new THREE.MeshPhysicalMaterial({ color: options.fin, transparent: true, opacity: 0.64, roughness: 0.34, clearcoat: 0.6, side: THREE.DoubleSide })
      );
      anal.rotation.x = -Math.PI / 2;
      anal.rotation.z = -0.12;
      analPivot.add(anal);

      const pectoralL = new THREE.Mesh(
        createFinGeometry(options.length * 0.16, options.height * 0.22, 8, 0.8),
        new THREE.MeshPhysicalMaterial({ color: options.fin2, transparent: true, opacity: 0.62, roughness: 0.34, clearcoat: 0.6, side: THREE.DoubleSide })
      );
      const pectoralR = pectoralL.clone();
      pectoralL.position.set(-options.length * 0.12, -options.height * 0.04, options.width * 0.26);
      pectoralR.position.set(-options.length * 0.12, -options.height * 0.04, -options.width * 0.26);
      pectoralL.rotation.set(0.2, -0.2, 0.4);
      pectoralR.rotation.set(-0.2, 0.2, -0.4);
      root.add(pectoralL, pectoralR);

      const pelvicL = pectoralL.clone();
      const pelvicR = pectoralR.clone();
      pelvicL.position.set(0.03, -options.height * 0.18, options.width * 0.16);
      pelvicR.position.set(0.03, -options.height * 0.18, -options.width * 0.16);
      pelvicL.scale.multiplyScalar(0.72);
      pelvicR.scale.multiplyScalar(0.72);
      pelvicL.rotation.set(0.35, 0.1, 0.6);
      pelvicR.rotation.set(-0.35, -0.1, -0.6);
      root.add(pelvicL, pelvicR);

      const eyeGeo = new THREE.SphereGeometry(options.height * 0.08, 18, 18);
      const eyeMat = new THREE.MeshPhysicalMaterial({ color: 0x061018, roughness: 0.05, clearcoat: 1, emissive: 0x09111a });
      const eyeHLMat = new THREE.MeshBasicMaterial({ color: 0xeafcff });
      [-1, 1].forEach(side => {
        const eye = new THREE.Mesh(eyeGeo, eyeMat);
        eye.position.set(-options.length * 0.34, options.height * 0.08, side * options.width * 0.34);
        root.add(eye);
        const hl = new THREE.Mesh(new THREE.SphereGeometry(options.height * 0.028, 10, 10), eyeHLMat);
        hl.position.set(-options.length * 0.365, options.height * 0.105, side * options.width * 0.385);
        root.add(hl);
      });

      group.userData = {
        root,
        body,
        tailPivot,
        dorsalPivot,
        analPivot,
        pectoralL,
        pectoralR,
        pelvicL,
        pelvicR,
        phase: Math.random() * Math.PI * 2,
        wiggle: 0,
        speed: 1,
        length: options.length,
      };
      return group;
    }

    const fishVariants = [
      { base: '#ff8a5b', stripe: '#ffcf67', belly: 'rgba(255,241,210,0.75)', fin: 0xffc678, fin2: 0xffa07f, length: 1.18, height: 0.64, width: 0.35 },
      { base: '#5ec7ff', stripe: '#9cffe4', belly: 'rgba(232,255,255,0.72)', fin: 0x7df7ff, fin2: 0x7bb9ff, length: 1.05, height: 0.56, width: 0.3 },
      { base: '#ff6ca8', stripe: '#ffd36f', belly: 'rgba(255,230,235,0.72)', fin: 0xffb8de, fin2: 0xff97bd, length: 0.95, height: 0.5, width: 0.28 },
      { base: '#9a7cff', stripe: '#6de7ff', belly: 'rgba(240,235,255,0.68)', fin: 0xb8afff, fin2: 0x8cc9ff, length: 1.12, height: 0.6, width: 0.32 },
      { base: '#6fe27b', stripe: '#dfff8b', belly: 'rgba(243,255,220,0.7)', fin: 0xa7ffb2, fin2: 0x7ee9a4, length: 1.0, height: 0.54, width: 0.29 },
      { base: '#ffd161', stripe: '#ff8a6c', belly: 'rgba(255,250,220,0.68)', fin: 0xffda8f, fin2: 0xffb38a, length: 1.26, height: 0.68, width: 0.36 }
    ];

    const fishes = [];
    const fishGroup = new THREE.Group();
    world.add(fishGroup);

    function randRange(a, b) { return a + Math.random() * (b - a); }

    for (let i = 0; i < 8; i++) {
      const fish = makeFishVariant(fishVariants[i % fishVariants.length]);
      const pos = new THREE.Vector3(randRange(-half.x * 0.8, half.x * 0.8), randRange(0.7, half.y - 0.35), randRange(-half.z * 0.8, half.z * 0.8));
      const dir = new THREE.Vector3(randRange(-1,1), randRange(-0.25,0.25), randRange(-1,1)).normalize();
      fish.position.copy(pos);
      fishGroup.add(fish);
      fishes.push({
        obj: fish,
        velocity: dir.multiplyScalar(randRange(0.45, 0.82)),
        desired: new THREE.Vector3(),
        separation: new THREE.Vector3(),
        alignment: new THREE.Vector3(),
        cohesion: new THREE.Vector3(),
        wander: randRange(0, Math.PI * 2),
        burstTimer: randRange(0.4, 5.5),
        burst: randRange(0.85, 1.45),
        baseSpeed: randRange(0.35, 0.65),
        maxSpeed: randRange(0.8, 1.5),
        bank: 0,
        targetQuat: new THREE.Quaternion(),
        up: new THREE.Vector3(0,1,0)
      });
    }

    const tmpV1 = new THREE.Vector3();
    const tmpV2 = new THREE.Vector3();
    const tmpV3 = new THREE.Vector3();
    const basisM = new THREE.Matrix4();

    function updateFish(fishState, dt, t) {
      const { obj, velocity } = fishState;
      const pos = obj.position;
      fishState.wander += dt * (0.7 + fishState.baseSpeed) * (0.6 + Math.sin(t * 0.3 + obj.userData.phase));
      fishState.burstTimer -= dt;
      if (fishState.burstTimer <= 0) {
        fishState.burstTimer = randRange(2.5, 6.5);
        fishState.burst = randRange(0.95, 1.65);
      } else {
        fishState.burst += (1.0 - fishState.burst) * dt * 0.6;
      }

      const centerPull = tmpV1.set(-pos.x * 0.08, (tank.height * 0.52 - pos.y) * 0.06, -pos.z * 0.08);
      const wanderForce = tmpV2.set(
        Math.cos(fishState.wander) * 0.35,
        Math.sin(t * 0.7 + obj.userData.phase) * 0.08,
        Math.sin(fishState.wander * 0.83) * 0.28
      );

      const boundary = tmpV3.set(0,0,0);
      const margin = 0.48;
      if (pos.x > half.x - margin) boundary.x -= ((pos.x - (half.x - margin)) / margin) * 1.8;
      if (pos.x < -half.x + margin) boundary.x += (((-half.x + margin) - pos.x) / margin) * 1.8;
      if (pos.y > half.y - margin) boundary.y -= ((pos.y - (half.y - margin)) / margin) * 1.8;
      if (pos.y < 0.4 + margin * 0.2) boundary.y += (((0.4 + margin * 0.2) - pos.y) / margin) * 1.5;
      if (pos.z > half.z - margin) boundary.z -= ((pos.z - (half.z - margin)) / margin) * 1.8;
      if (pos.z < -half.z + margin) boundary.z += (((-half.z + margin) - pos.z) / margin) * 1.8;

      const separation = fishState.separation.set(0, 0, 0);
      const alignment = fishState.alignment.set(0, 0, 0);
      const cohesion = fishState.cohesion.set(0, 0, 0);
      let neighbors = 0;
      for (const other of fishes) {
        if (other === fishState) continue;
        const d = pos.distanceTo(other.obj.position);
        if (d < 1.1) {
          separation.add(tmpV1.copy(pos).sub(other.obj.position).normalize().multiplyScalar((1.1 - d) / 1.1));
        }
        if (d < 2.1) {
          alignment.add(other.velocity);
          cohesion.add(other.obj.position);
          neighbors++;
        }
      }
      if (neighbors > 0) {
        alignment.divideScalar(neighbors).normalize().multiplyScalar(0.16);
        cohesion.divideScalar(neighbors).sub(pos).multiplyScalar(0.05);
      }
      separation.multiplyScalar(0.42);

      fishState.desired
        .copy(centerPull)
        .add(wanderForce)
        .add(boundary)
        .add(separation)
        .add(alignment)
        .add(cohesion);

      velocity.addScaledVector(fishState.desired, dt * 0.9);
      const desiredSpeed = fishState.baseSpeed * fishState.burst + fishState.desired.length() * 0.16;
      const speed = THREE.MathUtils.clamp(velocity.length(), 0.2, fishState.maxSpeed);
      velocity.setLength(THREE.MathUtils.lerp(speed, desiredSpeed, dt * 1.7));
      if (velocity.lengthSq() < 1e-5) velocity.set(0.2, 0, 0);

      pos.addScaledVector(velocity, dt);
      pos.x = THREE.MathUtils.clamp(pos.x, -half.x, half.x);
      pos.y = THREE.MathUtils.clamp(pos.y, 0.34, half.y);
      pos.z = THREE.MathUtils.clamp(pos.z, -half.z, half.z);

      const forward = tmpV1.copy(velocity).normalize();
      const side = tmpV2.crossVectors(fishState.up, forward).normalize();
      const correctedUp = tmpV3.crossVectors(forward, side).normalize();
      basisM.makeBasis(forward, correctedUp, side);
      fishState.targetQuat.setFromRotationMatrix(basisM);

      // Blend steering into roll to simulate natural banking in turns.
      fishState.bank += ((fishState.desired.x * 0.4 + fishState.desired.z * 0.2) - fishState.bank) * dt * 1.5;
      obj.quaternion.slerp(fishState.targetQuat, dt * 3.2);
      obj.rotateX(fishState.bank * 0.08);

      const swimSpeed = velocity.length();
      const body = obj.userData.body;
      if (body.material.userData.shader) {
        body.material.userData.shader.uniforms.uTime.value = t + obj.userData.phase;
        body.material.userData.shader.uniforms.uSpeed.value = swimSpeed;
        body.material.userData.shader.uniforms.uWaveAmp.value = 0.08 + swimSpeed * 0.07;
      }

      const flapFreq = 3.5 + swimSpeed * 5.5;
      const flap = Math.sin(t * flapFreq + obj.userData.phase) * (0.18 + swimSpeed * 0.18);
      obj.userData.tailPivot.rotation.y = flap * 1.45;
      obj.userData.dorsalPivot.rotation.z = Math.sin(t * flapFreq * 0.5 + obj.userData.phase) * 0.08;
      obj.userData.analPivot.rotation.z = Math.sin(t * flapFreq * 0.55 + obj.userData.phase + 0.8) * 0.05;
      obj.userData.pectoralL.rotation.z = 0.5 + Math.sin(t * (flapFreq + 1.3) + obj.userData.phase) * 0.26;
      obj.userData.pectoralR.rotation.z = -0.5 - Math.sin(t * (flapFreq + 1.3) + obj.userData.phase) * 0.26;
      obj.userData.pelvicL.rotation.z = 0.35 + Math.sin(t * (flapFreq + 0.9) + obj.userData.phase + 1.1) * 0.16;
      obj.userData.pelvicR.rotation.z = -0.35 - Math.sin(t * (flapFreq + 0.9) + obj.userData.phase + 1.1) * 0.16;
      obj.userData.root.rotation.z = Math.sin(t * flapFreq * 0.5 + obj.userData.phase) * 0.03;
    }

    const clock = new THREE.Clock();

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.033);
      const t = clock.elapsedTime;

      const topPos = waterTop.geometry.attributes.position;
      for (let i = 0; i < topPos.count; i++) {
        const x = topPos.getX(i);
        const z = topPos.getY(i);
        const wave = Math.sin(x * 1.8 + t * 1.4) * 0.04 + Math.cos(z * 2.3 - t * 1.1) * 0.03 + Math.sin((x + z) * 1.2 - t * 1.6) * 0.02;
        topPos.setZ(i, wave);
      }
      topPos.needsUpdate = true;
      waterTop.geometry.computeVertexNormals();
      water.material.opacity = 0.16 + Math.sin(t * 0.8) * 0.015;
      caustic.position.x = Math.sin(t * 0.7) * 1.4;
      caustic.position.z = Math.cos(t * 0.9) * 0.9;

      plants.children.forEach((blade, i) => {
        const arr = blade.geometry.attributes.position.array;
        const base = blade.userData.base;
        for (let j = 0; j < arr.length; j += 3) {
          const y = base[j + 1];
          const influence = Math.max(0, y / blade.geometry.parameters.height);
          arr[j] = base[j] + Math.sin(t * 1.2 + i * 0.7 + y * 3.2) * 0.03 * influence;
          arr[j + 2] = base[j + 2] + Math.cos(t * 1.1 + i * 0.5 + y * 2.4) * 0.04 * influence;
        }
        blade.geometry.attributes.position.needsUpdate = true;
      });

      for (let i = 0; i < bubbleCount; i++) {
        const b = bubbleData[i];
        b.y += b.speed * dt;
        b.x += Math.sin(t * 0.9 + b.phase + b.y * 2.0) * dt * b.sway * 0.18;
        b.z += Math.cos(t * 0.8 + b.phase + b.y * 1.7) * dt * b.sway * 0.12;
        if (b.y > tank.height - 0.15) {
          b.y = 0.08 + Math.random() * 0.25;
          b.x = (Math.random() - 0.5) * (tank.width - 0.5);
          b.z = (Math.random() - 0.5) * (tank.depth - 0.5);
        }
        bubblePositions[i * 3] = b.x;
        bubblePositions[i * 3 + 1] = b.y;
        bubblePositions[i * 3 + 2] = b.z;
      }
      bubbleGeo.attributes.position.needsUpdate = true;

      fishes.forEach(f => updateFish(f, dt, t));
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      bubbleMat.uniforms.pixelRatio.value = Math.min(window.devicePixelRatio, 2);
    });
  </script>
</body>
</html>
